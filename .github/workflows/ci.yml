name: Build and Push Docker Image

# main 브랜치에 코드가 push될 때만 CI/CD 동작
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: self-hosted

    steps:
      # 1. GitHub 저장소의 코드를 러너(Runner) 환경으로 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 다중 아키텍처 및 고급 캐싱을 지원하기 위한 Docker Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Docker Hub 로그인 (GitHub Secrets 사용)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Git 커밋 해시(short SHA)를 가져와 이미지 태그용 변수로 저장
      - name: Get Git short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # 5. Docker 이미지 빌드 및 Docker Hub 저장소로 푸시
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 하나의 빌드로 'latest'와 '커밋 해시' 두 가지 태그를 동시 생성
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/spam-classifier:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/spam-classifier:${{ steps.vars.outputs.sha_short }}
          
          # Docker 빌드 레이어 캐싱을 통해 재빌드 속도 최적화
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/spam-classifier:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/spam-classifier:buildcache,mode=max

  deploy:
    name: Deploy to Local Environment
    needs: build-and-push
    runs-on: self-hosted
    
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKERHUB_PASSWORD }}

      - name: Pull the latest Docker image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/spam-classifier:latest

      - name: Stop existing container
        run: docker stop spam-classifier
        continue-on-error: true

      - name: Remove existing container
        run: docker rm spam-classifier
        continue-on-error: true

      - name: Run new container
        run: docker run -d --name spam-classifier -p 8000:8000 ${{ secrets.DOCKERHUB_USERNAME }}/spam-classifier:latest
